        <a href="contact.html" class="active">お問い合わせ</a>

    <main>
        <section>
            <h2>お問い合わせ</h2>
            <p>連絡等がある場合は、以下フォームかメアドを使用してお気軽にお問い合わせください！</p>
            <p><i class="fas fa-envelope"></i> <strong>Email:</strong> <a href="mailto:toki.zeno.0508@gmail.com">toki.zeno.0508@gmail.com</a></p>
            <form id="contact-form" class="contact-form" method="POST" action="https://api.web3forms.com/submit">
                <input type="hidden" name="access_key" value="86c62e4f-a41f-4d69-847e-68cf41b921e9">
                <input type="hidden" name="subject" value="新しいお問い合わせメッセージ">
                <input type="hidden" name="from_name" value="ポートフォリオお問い合わせ">
                <input type="hidden" name="redirect" value="https://toki-0508.github.io/araitomoki-portfolio/contact.html?success=true">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">メッセージ</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">送信する</button>
                <div id="result" style="margin-top: 15px; display: none; padding: 10px; border-radius: 8px; text-align: center;"></div>
            </form>
        </section>
